<!-- What's My Tax Rate — mark for LIGHT backgrounds (transparent).
     Four ascending bars = the tax brackets; the gold dot crowning the tallest
     bar is your effective rate / "you are here". Palette: #4A1D6A #7C3AED #F2B347.
     For dark backgrounds use logo-mark-white.svg. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -2 48 48" role="img" aria-label="What's My Tax Rate">
  <rect x="6" y="30" width="6" height="12" rx="2" fill="#C9B8EC"/>
  <rect x="16" y="24" width="6" height="18" rx="2" fill="#9B7BD4"/>
  <rect x="26" y="17" width="6" height="25" rx="2" fill="#7C3AED"/>
  <rect x="36" y="9" width="6" height="33" rx="2" fill="#4A1D6A"/>
  <circle cx="39" cy="5" r="3.4" fill="#F2B347"/>
</svg>
