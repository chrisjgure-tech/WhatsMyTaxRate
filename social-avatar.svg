<!-- Square social avatar / app tile. Purple gradient, light mark, gold dot.
     Mark is centred with margin so it survives a circle crop on any platform. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#4A1D6A"/><stop offset="1" stop-color="#7C3AED"/></linearGradient></defs>
  <rect width="100" height="100" rx="22" fill="url(#g)"/>
  <g transform="translate(27 27) scale(0.96)">
  <rect x="6" y="30" width="6" height="12" rx="2" fill="#C9B8EC"/>
  <rect x="16" y="24" width="6" height="18" rx="2" fill="#D9C9F5"/>
  <rect x="26" y="17" width="6" height="25" rx="2" fill="#EDE4FB"/>
  <rect x="36" y="9" width="6" height="33" rx="2" fill="#FFFFFF"/>
  <circle cx="39" cy="5" r="3.4" fill="#F2B347"/></g>
</svg>
